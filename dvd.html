<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>...</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      font-family: 'Arial Black', sans-serif;
    }

    #logo {
      position: absolute;
      user-select: none;
      line-height: 1;
      text-align: center;
      transition: color 0.3s;
    }

    #logo .top {
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      display: block;
    }

    #logo .sub {
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      opacity: 0.7;
      display: block;
      margin-top: 2px;
    }

    #corner-flash {
      position: fixed;
      bottom: 1.5rem;
      right: 2rem;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.12);
      font-family: monospace;
    }

    #exit-btn {
      position: fixed;
      top: 1.5rem;
      left: 2rem;
      font-size: 13px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
      font-family: monospace;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 0.5rem 1.2rem;
      cursor: pointer;
      transition: color 0.2s, background 0.2s, border-color 0.2s;
    }
    #exit-btn:hover {
      color: #fff;
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.5);
    }
  </style>
</head>
<body>

<div id="logo">
  <span class="top">RabidFreak</span>
  
</div>

<div id="corner-flash"></div>
<button id="exit-btn" onclick="window.location.href='index.html'">← exit</button>

<script>
  const logo   = document.getElementById('logo');
  const flash  = document.getElementById('corner-flash');

  const COLORS = [
    '#7fffb2','#5bffe4','#ff6b6b','#ffd166',
    '#a0c4ff','#ff9ff3','#ff9f43','#48dbfb',
    '#00d2d3','#54a0ff','#5f27cd','#ff6348',
  ];

  let W = window.innerWidth;
  let H = window.innerHeight;

  // Logo size
  const LW = 220;
  const LH = 60;

  let x = Math.random() * (W - LW);
  let y = Math.random() * (H - LH);
  let dx = 2.2;
  let dy = 1.8;
  let colorIndex = 0;
  let corners = 0;

  logo.style.width  = LW + 'px';
  logo.style.height = LH + 'px';
  logo.style.color  = COLORS[colorIndex];

  window.addEventListener('resize', () => {
    W = window.innerWidth;
    H = window.innerHeight;
  });

  function setColor(i) {
    colorIndex = i % COLORS.length;
    logo.style.color = COLORS[colorIndex];
  }

  function tick() {
    x += dx;
    y += dy;

    let hitCorner = false;
    let bounced = false;

    if (x <= 0) {
      x = 0; dx = Math.abs(dx); bounced = true;
    } else if (x + LW >= W) {
      x = W - LW; dx = -Math.abs(dx); bounced = true;
    }

    if (y <= 0) {
      y = 0; dy = Math.abs(dy);
      if (bounced) hitCorner = true;
      bounced = true;
    } else if (y + LH >= H) {
      y = H - LH; dy = -Math.abs(dy);
      if (bounced) hitCorner = true;
      bounced = true;
    }

    if (bounced) setColor(colorIndex + 1);

    if (hitCorner) {
      corners++;
      flash.textContent = `corner hits: ${corners}`;
      setTimeout(() => { flash.textContent = ''; }, 1500);
    }

    logo.style.left = x + 'px';
    logo.style.top  = y + 'px';

    requestAnimationFrame(tick);
  }

  tick();
</script>
</body>
</html>
